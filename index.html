document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

p:3px;line-height:1.4\">{{ a.notes }}<\/div>\n                      <div style=\"font-size:10.5px;color:#9aa8a6;font-weight:600;margin-top:3px\">— {{ a.user }}<\/div>\n                    <\/div>\n                  <\/div>\n                <\/sc-for>\n              <\/div>\n            <\/sc-if>\n            <sc-if value=\"{{ sel.noActivities }}\"><div style=\"font-size:12px;color:#9aa8a6;font-weight:600;padding:4px 0\">No activity logged yet.<\/div><\/sc-if>\n          <\/div>\n\n        <\/div>\n\n        <!-- footer actions -->\n        <div style=\"flex:none;background:#fff;border-top:1px solid #e7eceb;padding:12px 20px;display:flex;gap:9px\">\n          <button onclick=\"{{ sel.onCall }}\" style=\"{{ drawerBtn }}\" style-hover=\"background:#f0f5f4\"><span class=\"msi\" style=\"font-size:17px\">call<\/span>Call<\/button>\n          <button onclick=\"{{ sel.onWhatsapp }}\" style=\"{{ drawerBtn }}\" style-hover=\"background:#f0f5f4\"><img src=\"https:\/\/cdn.simpleicons.org\/whatsapp\/25D366\" alt=\"\" width=\"16\" height=\"16\" style=\"display:block\">WhatsApp<\/button>\n          <button onclick=\"{{ sel.onEmail }}\" style=\"{{ drawerBtn }}\" style-hover=\"background:#f0f5f4\"><span class=\"msi\" style=\"font-size:17px\">mail<\/span>Email<\/button>\n          <button onclick=\"{{ sel.onSchedule }}\" style=\"flex:1;height:38px;display:flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:9px;background:{{ accent }};color:{{ accentInk }};font-family:inherit;font-weight:700;font-size:12.5px;cursor:pointer\" style-hover=\"filter:brightness(.96)\"><span class=\"msi\" style=\"font-size:17px\">event<\/span>Schedule Demo<\/button>\n        <\/div>\n\n      <\/div>\n    <\/div>\n  <\/sc-if>\n\n  <!-- ===== NEW LEAD MODAL ===== -->\n  <sc-if value=\"{{ newLeadOpen }}\">\n    <div onclick=\"{{ closeNewLead }}\" style=\"position:fixed;inset:0;background:rgba(15,27,26,.34);z-index:60;display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto;animation:ovIn .18s ease\">\n      <div onclick=\"{{ stopProp }}\" style=\"width:560px;max-width:100%;background:#fff;border-radius:16px;box-shadow:0 24px 60px rgba(15,27,26,.28);display:flex;flex-direction:column;animation:fadeUp .22s cubic-bezier(.22,1,.36,1)\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid #e7eceb\">\n          <div style=\"display:flex;align-items:center;gap:10px\">\n            <span style=\"width:34px;height:34px;border-radius:10px;background:{{ accentSoft }};color:{{ accent }};display:flex;align-items:center;justify-content:center\"><span class=\"msi\" style=\"font-size:20px\">person_add<\/span><\/span>\n            <div><div style=\"font-size:16px;font-weight:800;letter-spacing:-.2px\">Add New Lead<\/div><div style=\"font-size:11.5px;color:#9aa8a6;font-weight:600\">Capture a salon lead into the pipeline<\/div><\/div>\n          <\/div>\n          <button onclick=\"{{ closeNewLead }}\" style=\"width:32px;height:32px;border:1px solid #e7eceb;border-radius:9px;background:#fff;color:#5d6e6c;cursor:pointer;display:flex;align-items:center;justify-content:center\" style-hover=\"background:#f0f5f4\"><span class=\"msi\" style=\"font-size:19px\">close<\/span><\/button>\n        <\/div>\n\n        <div style=\"padding:20px 22px;display:flex;flex-direction:column;gap:16px;max-height:62vh;overflow-y:auto\">\n          <div>\n            <div style=\"font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:#9aa8a6;margin-bottom:11px\">Salon Details<\/div>\n            <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px\">\n              <label style=\"grid-column:span 2;display:flex;flex-direction:column;gap:5px\"><span style=\"{{ fldLabel }}\">Salon Name *<\/span><input value=\"{{ draft.salon_name }}\" oninput=\"{{ ndSalon }}\" placeholder=\"e.g. Bloom Beauty Lounge\" style=\"{{ fldInput }}\" style-focus=\"border-color:{{ accent }};background:#fff\"><\/label>\n              <label style=\"display:flex;flex-direction:column;gap:5px\"><span style=\"{{ fldLabel }}\">Owner Name<\/span><input value=\"{{ draft.owner_name }}\" oninput=\"{{ ndOwner }}\" placeholder=\"e.g. Priya Nair\" style=\"{{ fldInput }}\" style-focus=\"border-color:{{ accent }};background:#fff\"><\/label>\n              <label style=\"display:flex;flex-direction:column;gap:5px\"><span style=\"{{ fldLabel }}\">City<\/span><input value=\"{{ draft.city }}\" oninput=\"{{ ndCity }}\" placeholder=\"e.g. Mumbai\" style=\"{{ fldInput }}\" style-focus=\"border-color:{{ accent }};background:#fff\"><\/label>\n              <label style=\"display:flex;flex-direction:column;gap:5px\"><span style=\"{{ fldLabel }}\">Phone<\/span><input value=\"{{ draft.phone }}\" oninput=\"{{ ndPhone }}\" placeholder=\"+91 ...\" style=\"{{ fldInput }}\" style-focus=\"border-color:{{ accent }};background:#fff\"><\/label>\n              <label style=\"display:flex;flex-direction:column;gap:5px\"><span style=\"{{ fldLabel }}\">Email<\/span><input value=\"{{ draft.email }}\" oninput=\"{{ ndEmail }}\" placeholder=\"name@salon.in\" style=\"{{ fldInput }}\" style-focus=\"border-color:{{ accent }};background:#fff\"><\/label>\n            <\/div>\n          <\/div>\n\n          <div>\n            <div style=\"font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:#9aa8a6;margin-bottom:11px\">Pipeline<\/div>\n            <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px\">\n              <label style=\"display:flex;flex-direction:column;gap:5px\"><span style=\"{{ fldLabel }}\">Lead Source<\/span><select value=\"{{ draft.lead_source }}\" onchange=\"{{ ndSource }}\" style=\"{{ fldInput }}\"><option>Meta Ads<\/option><option>Website<\/option><option>Referral<\/option><option>WhatsApp<\/option><option>SoftwareSuggest<\/option><\/select><\/label>\n              <label style=\"display:flex;flex-direction:column;gap:5px\"><span style=\"{{ fldLabel }}\">Assigned POC<\/span><select value=\"{{ draft.assigned_poc }}\" onchange=\"{{ ndPoc }}\" style=\"{{ fldInput }}\"><option>Rupesh<\/option><option>Vipul<\/option><option>Hitesh<\/option><option>Anuj<\/option><option>Chhavi<\/option><\/select><\/label>\n              <label style=\"display:flex;flex-direction:column;gap:5px\"><span style=\"{{ fldLabel }}\">Priority<\/span><select value=\"{{ draft.priority }}\" onchange=\"{{ ndPriority }}\" style=\"{{ fldInput }}\"><option value=\"hot\">Hot<\/option><option value=\"warm\">Warm<\/option><option value=\"cold\">Cold<\/option><\/select><\/label>\n              <label style=\"display:flex;flex-direction:column;gap:5px\"><span style=\"{{ fldLabel }}\">Initial Stage<\/span><select value=\"{{ draft.status }}\" onchange=\"{{ ndStatus }}\" style=\"{{ fldInput }}\"><sc-for list=\"{{ stageOptions }}\" as=\"o\" hint-placeholder-count=\"11\"><option value=\"{{ o.key }}\">{{ o.label }}<\/option><\/sc-for><\/select><\/label>\n            <\/div>\n          <\/div>\n\n          <div>\n            <div style=\"font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:#9aa8a6;margin-bottom:11px\">Qualification<\/div>\n            <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px\">\n              <label style=\"display:flex;flex-direction:column;gap:5px\"><span style=\"{{ fldLabel }}\">Current Software<\/span><input value=\"{{ draft.current_software }}\" oninput=\"{{ ndSoftware }}\" placeholder=\"e.g. None \/ Excel\" style=\"{{ fldInput }}\" style-focus=\"border-color:{{ accent }};background:#fff\"><\/label>\n              <label style=\"display:flex;flex-direction:column;gap:5px\"><span style=\"{{ fldLabel }}\">Purchase Timeline<\/span><input value=\"{{ draft.purchase_timeline }}\" oninput=\"{{ ndTimeline }}\" placeholder=\"e.g. 1 month\" style=\"{{ fldInput }}\" style-focus=\"border-color:{{ accent }};background:#fff\"><\/label>\n              <label style=\"display:flex;flex-direction:column;gap:5px\"><span style=\"{{ fldLabel }}\">Monthly Appointments<\/span><input value=\"{{ draft.monthly_appointments }}\" oninput=\"{{ ndAppts }}\" type=\"number\" placeholder=\"0\" style=\"{{ fldInput }}\" style-focus=\"border-color:{{ accent }};background:#fff\"><\/label>\n              <label style=\"display:flex;flex-direction:column;gap:5px\"><span style=\"{{ fldLabel }}\">Expected Revenue (₹)<\/span><input value=\"{{ draft.expected_revenue }}\" oninput=\"{{ ndRevenue }}\" type=\"number\" placeholder=\"0\" style=\"{{ fldInput }}\" style-focus=\"border-color:{{ accent }};background:#fff\"><\/label>\n            <\/div>\n          <\/div>\n\n          <sc-if value=\"{{ draftError }}\"><div style=\"display:flex;align-items:center;gap:7px;font-size:12px;font-weight:600;color:#ef4444;background:#ef44441a;border-radius:8px;padding:9px 12px\"><span class=\"msi\" style=\"font-size:16px\">error<\/span>{{ draftError }}<\/div><\/sc-if>\n        <\/div>\n\n        <div style=\"display:flex;justify-content:flex-end;gap:10px;padding:15px 22px;border-top:1px solid #e7eceb\">\n          <button onclick=\"{{ closeNewLead }}\" style=\"height:38px;padding:0 18px;border:1px solid #e7eceb;border-radius:9px;background:#fff;color:#5d6e6c;font-family:inherit;font-weight:700;font-size:13px;cursor:pointer\" style-hover=\"background:#f0f5f4\">Cancel<\/button>\n          <button onclick=\"{{ saveNewLead }}\" style=\"height:38px;display:flex;align-items:center;gap:7px;padding:0 18px;border:none;border-radius:9px;background:{{ accent }};color:{{ accentInk }};font-family:inherit;font-weight:700;font-size:13px;cursor:pointer;box-shadow:0 2px 8px rgba(90,206,196,.4)\" style-hover=\"filter:brightness(.96)\"><span class=\"msi\" style=\"font-size:18px\">add<\/span>Add Lead<\/button>\n        <\/div>\n      <\/div>\n    <\/div>\n  <\/sc-if>\n\n<\/div>\n<\/sc-if>\n<\/x-dc>\n<script type=\"text\/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: { &quot;width&quot;: 1440, &quot;height&quot;: 900 },\n  &quot;accentColor&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#5acec4&quot;, &quot;tsType&quot;: &quot;string&quot; },\n  &quot;defaultView&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;board&quot;, &quot;options&quot;: [&quot;board&quot;, &quot;analytics&quot;], &quot;tsType&quot;: &quot;string&quot; },\n  &quot;showAutomationHints&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot; }\n}\">\n\/*\n  Supabase-ready data model. Each object below maps 1:1 to a row in a `leads` table.\n  Suggested schema (snake_case throughout so wiring is trivial):\n    id text pk, salon_name text, owner_name text, city text, address text,\n    website text, instagram text, lead_source text, phone text, email text,\n    current_software text, current_software_renewal date, purchase_timeline text,\n    monthly_appointments int, branches int, staff_count int, budget text,\n    decision_maker text, why_looking text, assigned_poc text, priority text,\n    status text, created_at date, last_contact_date date, next_followup_date date,\n    days_since_activity int, expected_revenue numeric, demo_date date, demo_time text,\n    meet_link text, demo_conducted_by text, demo_status text, requirements text,\n    pain_points text, features_liked text, recommended_plan text,\n    closure_probability text, expected_closure_date date\n  Plus a related `lead_activities` table: { id, lead_id fk, date, type, notes, user_name }.\n  Replace seedLeads() with a Supabase select; setState({leads}) and everything reacts.\n*\/\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.dragId = null;\n    this.sb = null;          \/\/ Supabase client (set on mount)\n    this._subscribed = false; \/\/ realtime subscription guard\n    this.state = {\n      view: (props.defaultView === 'analytics') ? 'analytics' : 'board',\n      drawerOpen: false,\n      selectedId: null,\n      dragOver: null,\n      newCounter: 0,\n      editMode: false, editDraft: {}, editError: '', editBusy: false,\n      noteOpen: false, noteDraft: { type: 'Call', time: '', notes: '' },\n      filters: { search: '', poc: 'all', source: 'all', priority: 'all', city: 'all', followup: 'all' },\n      leads: [],\n      \/\/ ----- auth \/ loading -----\n      authReady: false,   \/\/ have we finished checking the session?\n      session: null,      \/\/ current Supabase auth session\n      authEmail: '', authPassword: '', authError: '', authBusy: false,\n      loading: false, loadError: '',\n    };\n  }\n\n  \/\/ ---------- supabase lifecycle ----------\n  componentDidMount() {\n    const begin = () => {\n      const sb = window.__sb;\n      if (!sb) { setTimeout(begin, 120); return; } \/\/ wait for the CDN client\n      this.sb = sb;\n      sb.auth.getSession().then(({ data }) => {\n        const session = (data && data.session) || null;\n        this.setState({ authReady: true, session });\n        if (session) this.loadData();\n      }).catch(() => this.setState({ authReady: true }));\n      sb.auth.onAuthStateChange((_event, session) => {\n        const had = !!this.state.session;\n        this.setState({ session: session || null, authError: '' });\n        if (session && !had) this.loadData();\n        if (!session) this.setState({ leads: [] });\n      });\n    };\n    begin();\n  }\n\n  \/\/ Map a Supabase row (with nested lead_activities) into the shape the UI expects.\n  fromRow(r) {\n    const acts = (r.lead_activities || []).slice()\n      .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))\n      .map(a => ({ date: a.date, time: a.time, type: a.type, notes: a.notes, user: a.user_name }));\n    const o = { ...r, activities: acts };\n    delete o.lead_activities;\n    return o;\n  }\n\n  async loadData() {\n    const sb = this.sb; if (!sb) return;\n    this.setState({ loading: true, loadError: '' });\n    try {\n      const { data, error } = await sb\n        .from('leads')\n        .select('*, lead_activities(*)')\n        .order('inserted_at', { ascending: true });\n      if (error) throw error;\n      this.setState({ leads: (data || []).map(r => this.fromRow(r)), loading: false });\n      this.subscribeRealtime();\n    } catch (e) {\n      this.setState({ loading: false, loadError: (e && e.message) || String(e) });\n    }\n  }\n\n  \/\/ Keep every signed-in teammate's board in sync in real time.\n  subscribeRealtime() {\n    if (this._subscribed || !this.sb) return;\n    this._subscribed = true;\n    try {\n      this.sb.channel('abitzu-board')\n        .on('postgres_changes', { event: '*', schema: 'public', table: 'leads' }, () => this.scheduleReload())\n        .on('postgres_changes', { event: '*', schema: 'public', table: 'lead_activities' }, () => this.scheduleReload())\n        .subscribe();\n    } catch (_) {}\n  }\n  scheduleReload() {\n    clearTimeout(this._reloadT);\n    this._reloadT = setTimeout(() => this.refreshLeads(), 250);\n  }\n  async refreshLeads() {\n    const sb = this.sb; if (!sb) return;\n    const { data, error } = await sb.from('leads').select('*, lead_activities(*)').order('inserted_at', { ascending: true });\n    if (!error && data) this.setState({ leads: data.map(r => this.fromRow(r)) });\n  }\n\n  \/\/ ---------- auth actions ----------\n  async signIn() {\n    const sb = this.sb;\n    const email = (this.state.authEmail || '').trim();\n    const password = this.state.authPassword || '';\n    if (!email || !password) { this.setState({ authError: 'Enter your email and password.' }); return; }\n    if (!sb) { this.setState({ authError: 'Still connecting — please try again in a moment.' }); return; }\n    this.setState({ authBusy: true, authError: '' });\n    const { error } = await sb.auth.signInWithPassword({ email, password });\n    if (error) this.setState({ authBusy: false, authError: error.message || 'Sign in failed.' });\n    else this.setState({ authBusy: false, authPassword: '' });\n  }\n  async signOut() {\n    if (this.sb) { try { await this.sb.auth.signOut(); } catch (_) {} }\n    this.setState({ session: null, leads: [], drawerOpen: false, view: 'board' });\n  }\n  currentUserName() {\n    const s = this.state.session;\n    return (s && s.user && s.user.email) || 'Team';\n  }\n\n  \/\/ ---------- config ----------\n  colors() {\n    const accent = this.props.accentColor || '#5acec4';\n    return {\n      accent,\n      accentInk: '#08332f',\n      accentSoft: accent + '24',\n      border: '#e7eceb',\n      hot: '#ef4444', warm: '#f59e0b', cold: '#22a06b',\n      green: '#16a34a', red: '#ef4444', gray: '#94a3b8',\n    };\n  }\n  stageDefs() {\n    return [\n      { key: 'new_lead',       label: 'NEW LEAD',      hint: 'Contact within 15 min', accent: '#5acec4' },\n      { key: 'contacted',      label: 'CONTACTED',     hint: 'Schedule a demo',       accent: '#3b82f6' },\n      { key: 'demo_requested', label: 'DEMO REQUESTED',hint: 'Confirm a slot',        accent: '#6366f1' },\n      { key: 'demo_scheduled', label: 'DEMO SCHEDULED',hint: 'Await demo date',       accent: '#8b5cf6' },\n      { key: 'demo_completed', label: 'DEMO COMPLETED',hint: 'Update feedback',       accent: '#a855f7' },\n      { key: 'follow_up',      label: 'FOLLOW UP',     hint: 'Follow-up due',         accent: '#f59e0b' },\n      { key: 'proposal_sent',  label: 'PROPOSAL SENT', hint: 'Await decision',        accent: '#0ea5e9' },\n      { key: 'negotiation',    label: 'NEGOTIATION',   hint: 'Commercial discussion', accent: '#ec4899' },\n      { key: 'converted',      label: 'CONVERTED',     hint: 'Customer onboarded',    accent: '#16a34a' },\n      { key: 'lost',           label: 'LOST',          hint: 'Archive',               accent: '#ef4444' },\n      { key: 'called_no_answer', label: 'CALLED · NO ANSWER', hint: 'Retry \/ reschedule', accent: '#64748b' },\n      { key: 'junk',           label: 'JUNK LEAD',     hint: 'Archive',               accent: '#94a3b8' },\n    ];\n  }\n  pocColor(name) {\n    return ({ Rupesh: '#6366f1', Vipul: '#0ea5e9', Hitesh: '#d946a6', Anuj: '#f59e0b', Chhavi: '#10b981' })[name] || '#64748b';\n  }\n  priorityMeta(p) {\n    const c = this.colors();\n    if (p === 'hot')  return { label: 'Hot',  color: c.hot,  soft: c.hot + '1f' };\n    if (p === 'warm') return { label: 'Warm', color: c.warm, soft: c.warm + '22' };\n    return { label: 'Cold', color: c.cold, soft: c.cold + '1f' };\n  }\n\n  \/\/ ---------- helpers ----------\n  v(x) { return (x === undefined || x === null || x === '') ? '—' : x; }\n  fmtFollowup(iso) {\n    if (!iso) return '—';\n    const d = new Date(iso); if (isNaN(d)) return '—';\n    return d.toLocaleString('en', { day: '2-digit', month: 'short', hour: 'numeric', minute: '2-digit' });\n  }\n  cardSchedule(iso, overdue) {\n    if (!iso) return '—';\n    const d = new Date(iso); if (isNaN(d)) return '—';\n    const time = d.toLocaleString('en', { hour: 'numeric', minute: '2-digit' });\n    const md = d.toLocaleString('en', { month: 'short', day: 'numeric' });\n    if (overdue) return 'Overdue · ' + md + ', ' + time;\n    const startOfDay = x => new Date(x.getFullYear(), x.getMonth(), x.getDate()).getTime();\n    const diff = Math.round((startOfDay(d) - startOfDay(new Date())) \/ 86400000);\n    if (diff === 0) return 'Today, ' + time;\n    if (diff === 1) return 'Tomorrow, ' + time;\n    return md + ', ' + time;\n  }\n  editedAt(l) {\n    const t = Date.parse((l && (l.updated_at || l.inserted_at)) || '');\n    return isNaN(t) ? 0 : t;\n  }\n  toLocalInput(iso) {\n    if (!iso) return '';\n    const d = new Date(iso); if (isNaN(d)) return '';\n    const p = n => String(n).padStart(2, '0');\n    return d.getFullYear() + '-' + p(d.getMonth() + 1) + '-' + p(d.getDate()) + 'T' + p(d.getHours()) + ':' + p(d.getMinutes());\n  }\n  money(n) {\n    if (!n) return '—';\n    if (n >= 1e7) return '₹' + (n \/ 1e7).toFixed(2) + ' Cr';\n    return '₹' + (n \/ 1e5).toFixed(1) + ' L';\n  }\n\n  \/\/ ---------- actions ----------\n  openLead(id) { this.setState({ selectedId: id, drawerOpen: true, editMode: false, editError: '', noteOpen: false }); }\n  closeDrawer() { this.setState({ drawerOpen: false, editMode: false, editError: '', noteOpen: false }); }\n  moveLead(id, status) {\n    const patch = ['junk', 'lost', 'called_no_answer'].includes(status) ? { status, priority: 'cold' } : { status };\n    this.setState(s => ({ leads: s.leads.map(l => l.id === id ? { ...l, ...patch, updated_at: new Date().toISOString() } : l) }));\n    if (this.sb) {\n      this.sb.from('leads').update(patch).eq('id', id)\n        .then(({ error }) => { if (error) console.error('moveLead failed:', error.message); });\n    }\n  }\n  scheduleDemo(id) {\n    window.open('https:\/\/calendly.com\/rm-abitzu\/software-demo', '_blank');\n    this.moveLead(id, 'demo_scheduled');\n  }\n  openNoteForm() {\n    const d = new Date();\n    const defTime = d.toLocaleTimeString('en', { hour: 'numeric', minute: '2-digit' });\n    this.setState({ noteOpen: true, noteDraft: { type: 'Call', time: defTime, notes: '' } });\n  }\n  closeNoteForm() { this.setState({ noteOpen: false }); }\n  setNote(k, val) { this.setState(s => ({ noteDraft: { ...s.noteDraft, [k]: val } })); }\n  saveNote(id) {\n    const nd = this.state.noteDraft || {};\n    const type = (nd.type || '').trim();\n    const time = (nd.time || '').trim();\n    const notes = (nd.notes || '').trim();\n    if (!type || !notes) return;\n    const d = new Date();\n    const date = d.getDate() + ' ' + d.toLocaleString('en', { month: 'short' }) + ' ' + d.getFullYear();\n    const user = this.currentUserName();\n    const entry = { date, time, type, notes, user };\n    this.setState(s => ({ noteOpen: false, leads: s.leads.map(l => l.id === id\n      ? { ...l, activities: [entry, ...(l.activities || [])], last_contact_date: date, days_since_activity: 0, updated_at: new Date().toISOString() }\n      : l) }));\n    if (this.sb) {\n      this.sb.from('lead_activities').insert({ lead_id: id, date, time, type, notes, user_name: user })\n        .then(({ error }) => { if (error) console.error('saveNote failed:', error.message); });\n      this.sb.from('leads').update({ last_contact_date: date, days_since_activity: 0 }).eq('id', id)\n        .then(({ error }) => { if (error) console.error('saveNote (lead) failed:', error.message); });\n    }\n  }\n  setFilter(k, val) { this.setState(s => ({ filters: { ...s.filters, [k]: val } })); }\n  resetFilters() { this.setState({ filters: { search: '', poc: 'all', source: 'all', priority: 'all', city: 'all', followup: 'all' } }); }\n  emptyDraft() {\n    return {\n      salon_name: '', owner_name: '', city: '', phone: '', email: '',\n      lead_source: 'Website', assigned_poc: 'Rupesh', priority: 'warm', status: 'new_lead',\n      current_software: '', purchase_timeline: '', monthly_appointments: '', expected_revenue: '',\n    };\n  }\n  openNewLead() { this.setState({ newLeadOpen: true, draft: this.emptyDraft(), draftError: '' }); }\n  closeNewLead() { this.setState({ newLeadOpen: false }); }\n  setDraft(k, val) { this.setState(s => ({ draft: { ...s.draft, [k]: val } })); }\n  editFieldKeys() {\n    return ['salon_name','owner_name','assigned_poc','priority','phone','email','address','city','website','instagram',\n      'why_looking','current_software','salon_age','current_software_renewal','branches','staff_count',\n      'monthly_appointments','budget','decision_maker','purchase_timeline',\n      'demo_date','demo_time','meet_link','demo_conducted_by','demo_status',\n      'requirements','pain_points','features_liked','recommended_plan',\n      'closure_probability','expected_closure_date','expected_revenue','next_followup_at'];\n  }\n  startEdit() {\n    const lead = this.state.leads.find(l => l.id === this.state.selectedId);\n    if (!lead) return;\n    const d = {};\n    this.editFieldKeys().forEach(k
